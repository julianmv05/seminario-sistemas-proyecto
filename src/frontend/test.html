<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Balance | Evaluación</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    
    <nav class="barra-navegacion">
        <div class="logo">Mind Balance</div>
        <a href="index.html" class="boton-volver">Volver al Inicio</a>
    </nav>

  
    <header class="banner-test">
        <div class="contenido-banner">
            <h1>Evaluación de Ansiedad Académica</h1>
            <p>
                Responde las siguientes preguntas para identificar tu nivel de ansiedad
                académica y recibir orientación personalizada.
            </p>
        </div>
    </header>

    
    <main class="seccion-blanca">
    <section class="formulario-test">
        <h2 class="titulo-seccion" id="test-title">Evaluación Mind Balance</h2>
        
        <div id="quiz-wrapper" class="contenedor-cuestionario">
            <div id="question-container">
                <p id="question-text" style="font-weight: bold; font-size: 1.2em;">Cargando evaluación...</p>
                <div id="options-container" class="opciones">
                    </div>
            </div>
            
            <div style="background: #eee; height: 10px; border-radius: 5px; margin-top: 20px;">
                <div id="progress-bar" style="background: var(--color-principal); width: 0%; height: 100%; border-radius: 5px; transition: 0.3s;"></div>
            </div>
        </div>

        <div id="resultado-test" class="resultado-oculto"></div>
    </section>
</main>

    
    <footer>
        <p>&copy; 2026 Mind Balance - Proyecto de Desarrollo Independiente</p>
    </footer>

</body>
</html>
